# NGINX反向代理完整配置
# 适用于JIJI1.TV视频API和LIVE88.CO用户API

# ==================== 视频API代理 (JIJI1.TV) ====================
location /api/ {
    # 移除/api/前缀
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass https://jiji1.tv;
    
    # 基础代理头设置
    proxy_set_header Host jiji1.tv;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 保持所有原始请求头
    proxy_set_header User-Agent $http_user_agent;
    proxy_set_header Accept $http_accept;
    proxy_set_header Accept-Language $http_accept_language;
    proxy_set_header Content-Type $http_content_type;
    proxy_set_header Referer $http_referer;
    proxy_set_header Cookie $http_cookie;
    
    # 传递自定义头部（视频API需要）
    proxy_set_header reqTime $http_reqtime;
    proxy_set_header token $http_token;
    
    # CORS设置
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, reqTime, token" always;
    add_header Access-Control-Allow-Credentials true always;
    
    # 处理预检请求
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, reqTime, token" always;
        add_header Access-Control-Max-Age 3600 always;
        add_header Content-Length 0;
        return 200;
    }
    
    # 优化设置
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    
    # 超时设置
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # SSL设置
    proxy_ssl_verify off;
    proxy_ssl_server_name on;
}

# ==================== 用户API代理 (LIVE88.CO) ====================
location /livevideo/ {
    # 移除/livevideo/前缀，保持查询参数（注意结尾有斜杠）
    rewrite ^/livevideo/(.*)$ /$1 break;
    proxy_pass https://live.88tv.co/appapi;
    
    # 基础代理头设置
    proxy_set_header Host live.88tv.co;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 保持所有原始请求头
    proxy_set_header User-Agent $http_user_agent;
    proxy_set_header Accept $http_accept;
    proxy_set_header Accept-Language $http_accept_language;
    proxy_set_header Content-Type $http_content_type;
    proxy_set_header Content-Length $http_content_length;
    proxy_set_header Referer $http_referer;
    proxy_set_header Cookie $http_cookie;
    
    # CORS设置
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept" always;
    add_header Access-Control-Allow-Credentials true always;
    
    # 处理预检请求
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept" always;
        add_header Access-Control-Max-Age 3600 always;
        add_header Content-Length 0;
        return 200;
    }
    
    # 优化设置
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    
    # 超时设置
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # SSL设置
    proxy_ssl_verify off;
    proxy_ssl_server_name on;
}

